<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="209.14" height="343.94" viewBox="0 0 209.14 343.94" version="1.1">
  <!-- ====================================================================
       BASE DE RETOUCHE — schéma interne du clavier 3 colonnes (3×4)
       Repère interne (px) = mm de l'élément × 96/25,4. Broches = pinInfo Wokwi.
       À DESSINER : matrice 4 lignes (R) × 3 colonnes (C).
         - 1 poussoir (interrupteur) par croisement, posé sur un guide de touche.
         - bus de ligne horizontal -> pastille Ri ; bus de colonne vertical -> Cj.
       Le corps (#body) et les guides (#key-guides) et les repères (#pins-reference)
       NE SONT PAS exportés : ils servent juste au calage. Garder un groupe #schema
       (trait noir) qui sera repris dans internal-wiring.mts (keypad).
       ==================================================================== -->
  <rect id="body" x="0" y="0" width="209.14" height="343.94" rx="6" ry="6" fill="rgba(255,255,255,0.8)" stroke="#bbb" stroke-width="0.5"/>
  <g id="key-guides" fill="none" stroke="#ccc" stroke-width="0.6">
    <rect x="26.46" y="40.44" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="83.15" y="40.44" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="139.84" y="40.44" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="26.46" y="94.49" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="83.15" y="94.49" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="139.84" y="94.49" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="26.46" y="148.54" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="83.15" y="148.54" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="139.84" y="148.54" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="26.46" y="202.58" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="83.15" y="202.58" width="42.33" height="41.57" rx="3" ry="3"/>
    <rect x="139.84" y="202.58" width="42.33" height="41.57" rx="3" ry="3"/>
  </g>
  <!-- ===== À ÉDITER : tracés noirs (matrice + bus) ===== -->
  <g id="schema" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- dessiner ici -->
  </g>
  <!-- ===== Repères de broches (R rouge, C bleu) : NE PAS exporter ===== -->
  <g id="pins-reference">
    <g>
      <circle cx="76.5" cy="338" r="2.5" fill="#c00" stroke="none"/>
      <text x="76.5" y="333" font-size="6" fill="#c00" text-anchor="middle" font-family="sans-serif">R1</text>
    </g>
    <g>
      <circle cx="86" cy="338" r="2.5" fill="#c00" stroke="none"/>
      <text x="86" y="326" font-size="6" fill="#c00" text-anchor="middle" font-family="sans-serif">R2</text>
    </g>
    <g>
      <circle cx="95.75" cy="338" r="2.5" fill="#c00" stroke="none"/>
      <text x="95.75" y="333" font-size="6" fill="#c00" text-anchor="middle" font-family="sans-serif">R3</text>
    </g>
    <g>
      <circle cx="105.25" cy="338" r="2.5" fill="#c00" stroke="none"/>
      <text x="105.25" y="326" font-size="6" fill="#c00" text-anchor="middle" font-family="sans-serif">R4</text>
    </g>
    <g>

<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="75.59" height="75.59" viewBox="0 0 75.59 75.59" version="1.1">
  <!-- ====================================================================
       BASE DE RETOUCHE — schéma interne du potentiomètre
       Repère interne (px) = mm de l'élément × 96/25,4 (pinScale = 1).
       À DESSINER dans le groupe #schema : symbole IEC = boîte résistive entre
       VCC et GND + curseur (flèche) depuis SIG sur le milieu de la boîte.
       Le corps (#body) et les repères (#pins-reference) NE SONT PAS exportés
       (calage seul). Garder les tracés en noir dans #schema.
       ==================================================================== -->
  <rect id="body" x="0" y="0" width="75.59" height="75.59" rx="6" ry="6" fill="rgba(255,255,255,0.8)" stroke="#bbb" stroke-width="0.5"/>
  <!-- ===== À ÉDITER : tracés noirs (symbole pot) ===== -->
  <g id="schema" fill="none" stroke="#111" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- dessiner ici -->
  </g>
  <!-- ===== Repères de broches (VCC rouge, GND noir, SIG bleu) : NE PAS exporter ===== -->
  <g id="pins-reference">
    <g>
      <circle cx="29" cy="68.5" r="2.5" fill="#111" stroke="none"/>
      <text x="29" y="63.5" font-size="6" fill="#111" text-anchor="middle" font-family="sans-serif">GND</text>
    </g>
    <g>
      <circle cx="39" cy="68.5" r="2.5" fill="#06c" stroke="none"/>
      <text x="39" y="56.5" font-size="6" fill="#06c" text-anchor="middle" font-family="sans-serif">SIG</text>
    </g>
    <g>
      <circle cx="49" cy="68.5" r="2.5" fill="#c00" stroke="none"/>
      <text x="49" y="63.5" font-size="6" fill="#c00" text-anchor="middle" font-family="sans-serif">VCC</text>
    </g>
  </g>
</svg>

<svg viewBox="0 0 50 60" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- Retouche brochage buzzer : bouts de pattes sur les croisements (20,50) et (30,50) de la grille 10 px. -->
  <defs>
    <linearGradient id="buzzer-grad-metal">
      <stop style="stop-color:#c0c0c0;stop-opacity:1;" offset="0" />
      <stop style="stop-color:#c0c0c0;stop-opacity:0;" offset="1" />
    </linearGradient>
    <radialGradient xlink:href="#buzzer-grad-metal" id="buzzer-grad-top" cx="37.665886" cy="52.8969" fx="37.665886" fy="52.8969" r="10.085401" gradientUnits="userSpaceOnUse" gradientTransform="matrix(1.5388004,-0.07237603,0.0700703,1.4897773,-31.666782,-31.394907)" />
  </defs>
  <!-- Pattes (dessinées derrière le corps) : bouts exactement sur la grille. -->
  <path style="stroke:#000000;stroke-width:2.1;stroke-linecap:round" d="M 20,50 V 29.32" />
  <path style="stroke:#ff0000;stroke-width:2.1;stroke-linecap:round" d="M 30,50 V 29.32" />
  <g transform="matrix(0.7900013,0,0,0.7900013,1.299961,-10.591091)" style="stroke-width:1.26582">
    <circle style="fill:#000000;stroke-width:1.3924;stroke-linecap:round" cx="30" cy="44.683586" r="25.316414" />
    <circle style="fill:url(#buzzer-grad-top);stroke-width:1.3924;stroke-linecap:round" cx="30" cy="44.683586" r="4.9748101" />
  </g>
</svg>

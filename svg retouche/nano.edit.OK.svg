  <g id="board" opacity="0.85" transform="translate(20,20) scale(3.9370) translate(1.40,0.00)">
        <defs>
          <filter id="solderPlate" style="color-interpolation-filters:sRGB;">
            <feTurbulence result="r0" type="fractalNoise" baseFrequency="1" numOctaves="1"></feTurbulence>
            <feComposite result="r1" in="r0" in2="SourceGraphic" operator="arithmetic" k1=".6" k2=".6" k3="1.2" k4=".25"></feComposite>
            <feBlend result="r2" in="r1" in2="SourceGraphic" mode="luminosity"></feBlend>
            <feComposite result="r3" in="r2" in2="SourceGraphic" operator="in"></feComposite>
          </filter>
          <pattern id="pins-tqfp-0.5mm" width="1" height=".5" patternUnits="userSpaceOnUse">
            <rect fill="#333" width="1" height=".2" y=".17"></rect>
          </pattern>
          <pattern id="pins-pth-0.75" width="2.54" height="2.54" patternUnits="userSpaceOnUse">
